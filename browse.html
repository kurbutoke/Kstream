<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="content-type" content="text/html;charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=no">
  <meta name="author" content="Kstream">
  <title>Browse | Kstream</title>
  <meta name="description" content="Browse trending, popular, and top rated movies and TV series on Kstream.">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' https://image.tmdb.org data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.themoviedb.org; frame-src https://vidlink.pro https://vidsrc.xyz https://vidsrc.ru https://player.videasy.net https://frembed.one https://vidsrc.pro;">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://kurbutoke.github.io/Kstream/browse.html">
  <link rel="shortcut icon" href="./img/favicon.ico" type="image/x-icon">
  <link rel="icon" href="./img/favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
  <div class="wrapper">
    <header>
      <div class="container nav-bar">
        <div class="logo-row">
          <img class="home" id="home" onclick="window.location.href = '/Kstream/'" src="./img/logo.svg"
            alt="Kstream" width="141" height="47" style="cursor: pointer;">
        </div>

      </div>
    </header>

    <main>
      <div class="container">
        <div class="section-header" style="margin-top: 2rem;">
          <div class="section-title" id="page-title">Loading...</div>
        </div>

        <!-- Grid Container -->
        <div class="movies items" id="browse-items"
          style="flex-wrap: wrap; overflow: visible; justify-content: center; height: auto; max-height: none; width: 100%; left: auto; right: auto; margin-left: 0; margin-right: 0; padding: 0; gap: 20px;">
          <!-- Items injected here -->
        </div>

        <!-- Load More Button -->
        <div class="load-more-container" style="text-align: center; margin: 40px 0;">
          <button id="load-more-btn" class="tab-pill active"
            style="padding: 10px 30px; font-size: 1rem; border: none;">Load More</button>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <div class="abs">
          <p style="margin-bottom: 5px">Kstream is top of free streaming website.</p>
        </div>
      </div>
    </footer>
  </div>
  <script src="./config.js" defer></script>
  <script src="./utils.js" defer></script>
  <script type='text/javascript' src='./browse.js' defer></script>
</body>

</html>
