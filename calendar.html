<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="content-type" content="text/html;charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=no">
  <meta name="author" content="Kstream">
  <title>Calendar | Kstream</title>
  <meta name="description" content="Upcoming Movies and TV releases calendar on Kstream.">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' https://image.tmdb.org data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.themoviedb.org; frame-src https://vidlink.pro https://vidsrc.xyz https://vidsrc.ru https://player.videasy.net https://frembed.one https://vidsrc.pro;">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://kurbutoke.github.io/Kstream/calendar.html">
  <link rel="shortcut icon" href="./img/favicon.ico" type="image/x-icon">
  <link rel="icon" href="./img/favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
  <div class="wrapper">
    <header>
      <div class="container nav-bar" style="justify-content: center;">
        <div class="logo-row">
          <img class="home" id="home" onclick="window.location.href = '/Kstream/'" src="./img/logo.svg" alt="Kstream"
            width="141" height="47" style="cursor: pointer;">
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="calendar-header">
          <div class="calendar-nav">
            <button class="cal-nav-btn" id="prev-month"><i class="bi bi-chevron-left"></i></button>
            <h2 class="cal-month-title" id="month-title">May 2026</h2>
            <button class="cal-nav-btn" id="next-month"><i class="bi bi-chevron-right"></i></button>
          </div>
          <div class="calendar-tabs">
            <div class="tab-pill active" data-type="movie">Movies</div>
            <div class="tab-pill" data-type="tv">TV</div>
          </div>
        </div>

        <div class="calendar-weekdays">
          <div>Mon</div>
          <div>Tue</div>
          <div>Wed</div>
          <div>Thu</div>
          <div>Fri</div>
          <div>Sat</div>
          <div>Sun</div>
        </div>

        <div class="calendar-grid" id="calendar-grid">
          <!-- Calendar cells injected here -->
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <div class="abs">
          <p style="margin-bottom: 5px">Kstream is top of free streaming website.</p>
        </div>
      </div>
    </footer>
  </div>
  <script src="./config.js" defer></script>
  <script src="./utils.js" defer></script>
  <script src="./shared.js" defer></script>
  <script src="./calendar.js" defer></script>
</body>

</html>
